<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动化工厂 - 放置游戏原型</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --ok: #34d399;
      --warn: #f59e0b;
      --disabled: #4b5563;
      --border: #374151;
      --chip: #243044;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(1200px 800px at 20% -20%, #1d4ed8 0%, var(--bg) 45%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .game {
      width: min(960px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)) , var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .title { margin: 0; font-size: 1.5rem; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(140px, 1fr));
      gap: 12px;
      width: min(360px, 100%);
    }

    .stat-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .stat-card .label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .content {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .manual {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .btn {
      border: 1px solid transparent;
      background: #0ea5e9;
      color: #082f49;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.2s ease;
    }

    .btn:hover:enabled { filter: brightness(1.07); }
    .btn:active:enabled { transform: translateY(1px); }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .chip {
      background: var(--chip);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .chip.active {
      background: #0891b2;
      color: #ecfeff;
      border-color: #22d3ee;
    }

    .chip.small {
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 500;
      pointer-events: none;
    }

    .buildings {
      display: grid;
      gap: 10px;
    }

    .section-title {
      margin: 6px 0 2px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .upgrade {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .upgrade .name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .upgrade .meta {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .upgrade-btn {
      min-width: 220px;
      text-align: center;
      background: #f59e0b;
      color: #3b2300;
    }

    .upgrade-btn:disabled {
      cursor: not-allowed;
      background: var(--disabled);
      color: #d1d5db;
      opacity: 0.8;
    }

    .skill {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .skill .name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .skill .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .skill-btn {
      min-width: 180px;
      text-align: center;
      background: #a78bfa;
      color: #1f1147;
    }

    .skill-btn:disabled {
      cursor: not-allowed;
      background: var(--disabled);
      color: #d1d5db;
      opacity: 0.8;
    }

    .building {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .building .name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .building .meta {
      color: var(--muted);
      font-size: 0.88rem;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .buy-btn {
      min-width: 220px;
      text-align: center;
      background: var(--ok);
      color: #052e22;
    }

    .buy-btn:disabled {
      cursor: not-allowed;
      background: var(--disabled);
      color: #d1d5db;
      opacity: 0.8;
    }

    .hint {
      margin-top: 4px;
      color: var(--warn);
      font-size: 0.82rem;
      min-height: 1.2em;
    }

    .locked-note {
      color: #fca5a5;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .progress-wrap {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .progress-title {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: #0b1220;
      border: 1px solid #243244;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22d3ee, #34d399);
      transition: width 0.2s ease;
    }

    .progress-meta {
      margin-top: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .order-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .order-btn {
      background: #22c55e;
      color: #052e16;
      border: 1px solid #16a34a;
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .order-btn:disabled {
      cursor: not-allowed;
      background: var(--disabled);
      color: #d1d5db;
      border-color: var(--border);
      opacity: 0.8;
    }

    .order-btn.secondary {
      background: #1d4ed8;
      color: #dbeafe;
      border-color: #2563eb;
    }



    .fx-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 50;
    }

    .floating-gain {
      position: absolute;
      font-weight: 800;
      font-size: 0.9rem;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      animation: floatUp 0.85s ease-out forwards;
    }

    .floating-gain.gear { color: #34d399; }
    .floating-gain.rp { color: #a78bfa; }
    .floating-gain.priority-high {
      color: #fef08a;
      text-shadow: 0 0 10px rgba(250, 204, 21, 0.7), 0 4px 16px rgba(0, 0, 0, 0.45);
      -webkit-text-stroke: 0.35px #f59e0b;
      animation: floatUpHot 0.68s ease-out forwards;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.8); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -42px) scale(1.08); }
    }

    @keyframes floatUpHot {
      0% { opacity: 0; transform: translate(-50%, 0) scale(0.92); }
      20% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -56px) scale(1.18); }
    }

    .btn-pop {
      animation: btnPop 0.18s ease-out;
    }

    @keyframes btnPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .panel-pulse {
      animation: panelPulse 0.28s ease-out;
    }

    .panel-pulse-task { animation: panelPulseTask 0.28s ease-out; }
    .panel-pulse-order { animation: panelPulseOrder 0.28s ease-out; }
    .panel-pulse-prestige { animation: panelPulsePrestige 0.3s ease-out; }

    @keyframes panelPulse {
      0% { box-shadow: 0 0 0 rgba(34, 211, 238, 0); }
      45% { box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.45); }
      100% { box-shadow: 0 0 0 rgba(34, 211, 238, 0); }
    }

    @keyframes panelPulseTask {
      0% { box-shadow: 0 0 0 rgba(34, 211, 238, 0); }
      45% { box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.52); }
      100% { box-shadow: 0 0 0 rgba(34, 211, 238, 0); }
    }

    @keyframes panelPulseOrder {
      0% { box-shadow: 0 0 0 rgba(34, 197, 94, 0); }
      45% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.5); }
      100% { box-shadow: 0 0 0 rgba(34, 197, 94, 0); }
    }

    @keyframes panelPulsePrestige {
      0% { box-shadow: 0 0 0 rgba(167, 139, 250, 0); }
      45% { box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.55); }
      100% { box-shadow: 0 0 0 rgba(167, 139, 250, 0); }
    }



    .screen-shake {
      animation: screenShake 0.35s cubic-bezier(.36,.07,.19,.97);
    }

    @keyframes screenShake {
      0% { transform: translate3d(0, 0, 0); }
      20% { transform: translate3d(-3px, 2px, 0); }
      40% { transform: translate3d(3px, -2px, 0); }
      60% { transform: translate3d(-2px, 1px, 0); }
      80% { transform: translate3d(2px, -1px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    .achievement {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .achievement .name {
      font-size: 0.95rem;
      font-weight: 700;
    }

    .achievement .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .badge {
      font-size: 0.76rem;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 9px;
      border: 1px solid var(--border);
      background: #263244;
      color: #9ca3af;
    }

    .badge.done {
      background: #14532d;
      color: #dcfce7;
      border-color: #22c55e;
    }

    .log-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.82rem;
      color: var(--muted);
    }



    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .category {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: rgba(31, 41, 55, 0.45);
    }



    .category-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .category-toggle {
      border: 1px solid var(--border);
      background: #0b1220;
      color: #cbd5e1;
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 0.78rem;
      cursor: pointer;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .category-toggle .arrow {
      display: inline-block;
      transform: rotate(90deg);
      transition: transform 120ms ease;
      line-height: 1;
    }

    .category.collapsed .category-toggle .arrow {
      transform: rotate(0deg);
    }

    .category-toggle .badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.65);
      display: none;
      margin-left: 2px;
    }

    .category-toggle.has-alert .badge-dot {
      display: inline-block;
    }

    .category .category-body {
      max-height: 2000px;
      opacity: 1;
      overflow: hidden;
      transition: max-height 180ms ease, opacity 120ms ease;
    }

    .category.collapsed .category-body {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .category-title {
      margin: 0 0 10px;
      font-size: 0.92rem;
      color: #cbd5e1;
      letter-spacing: 0.02em;
    }

    .category .section-title {
      margin-top: 0;
    }

    @media (max-width: 960px) {
      .category-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .header { grid-template-columns: 1fr; }
      .stats { width: 100%; }
      .building { grid-template-columns: 1fr; }
      .buy-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="game">
    <section class="header">
      <div>
        <h1 class="title">⚙️ 自动化工厂</h1>
        <p class="subtitle">点击 + 自动化并行，持续扩张你的齿轮产线。</p>
      </div>
      <div class="stats">
        <div class="stat-card">
          <div class="label">齿轮总数</div>
          <div class="value" id="gears">0</div>
        </div>
        <div class="stat-card">
          <div class="label">GPS（每秒产出）</div>
          <div class="value" id="gps">0</div>
          <div class="subtitle" id="rp">研究点 RP：0</div>
        </div>
      </div>
    </section>

    <section class="content">
      <div class="manual">
        <div>
          <strong>手动生产</strong>
          <div class="subtitle" id="manualHint" style="margin-top:4px">每次点击 +1 齿轮</div>
        </div>
        <button id="manualBtn" class="btn">+1 齿轮</button>
      </div>

      <div class="controls">
        <span class="chip small">购买倍率</span>
        <button class="chip active" data-mode="1">x1</button>
        <button class="chip" data-mode="10">x10</button>
        <button class="chip" data-mode="100">x100</button>
        <button class="chip" data-mode="max">Max</button>
        <span class="chip small">仿真速度</span>
        <button class="chip active" data-speed="1">1x</button>
        <button class="chip" data-speed="2">2x</button>
        <button class="chip" data-speed="4">4x</button>
        <button class="chip" id="autoBuyBtn">自动购买: 关</button>
        <button class="chip" id="audioBtn">音效: 开</button>
        <button class="chip" id="lowPerfBtn">低性能模式: 关</button>
        <button class="chip" id="lowPerfAudioBtn">低性能音效保护: 关</button>
        <button class="chip" id="exportSaveBtn">导出存档</button>
        <button class="chip" id="importSaveBtn">导入存档</button>
        <button class="chip" id="prestigeBtn">软重置</button>
        <button class="chip" id="resetSaveBtn">重置存档</button>
      </div>

      <div id="offlineNotice" class="manual" style="display:none">
        <div>
          <strong>离线收益</strong>
          <div class="subtitle" id="offlineText" style="margin-top:4px"></div>
        </div>
        <button id="claimOfflineBtn" class="btn">领取</button>
      </div>

      <div class="progress-wrap">
        <div class="progress-title" id="goalTitle">阶段任务：完成引导目标</div>
        <div class="progress-track"><div id="goalFill" class="progress-fill"></div></div>
        <div class="progress-meta">
          <span id="goalHint">还差 1 台实习生</span>
          <span id="goalPct">0%</span>
          <span id="questReward">奖励：-</span>
        </div>
        <div class="subtitle" id="rewardFeed" style="margin-top:8px">成就奖励将显示在这里</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-title">统计摘要</div>
        <div class="progress-meta" style="margin-top:0">
          <span id="statBuildings">建筑总数：0</span>
          <span id="statUpgrades">升级已研发：0</span>
          <span id="statAchievements">成就完成：0/0</span>
        </div>
        <div class="progress-meta">
          <span id="statQuest">任务进度：0/0</span>
          <span id="statMode">自动购买：关</span>
          <span id="statLifetime">累计齿轮：0</span>
        </div>
      </div>

      <div class="progress-wrap" id="orderPanel">
        <div class="progress-title" id="orderTitle">生产订单：尚未解锁</div>
        <div class="progress-track"><div id="orderFill" class="progress-fill"></div></div>
        <div class="progress-meta">
          <span id="orderHint">累计齿轮达到 300 后解锁</span>
          <span id="orderPct">0%</span>
          <span id="orderReward">奖励：-</span>
        </div>
        <div class="order-actions">
          <button class="order-btn" id="claimOrderBtn" disabled>领取奖励</button>
          <button class="order-btn secondary" id="rerollOrderBtn" disabled>刷新订单（200 齿轮）</button>
        </div>
      </div>

      <div class="category-grid">
        <section class="category" data-category="economy">
          <div class="category-head">
            <h3 class="category-title">经济栏目</h3>
            <button class="category-toggle" data-toggle-category="economy"><span class="arrow">▶</span><span class="label">折叠</span><span class="badge-dot" aria-hidden="true"></span></button>
          </div>
          <div class="category-body">
          <h2 class="section-title">自动化建筑</h2>
          <div class="buildings" id="buildingList"></div>

          <h2 class="section-title">工厂升级</h2>
          <div class="buildings" id="upgradeList"></div>

          <h2 class="section-title">技能</h2>
          <div class="buildings" id="skillList"></div>

          <h2 class="section-title">建筑专精</h2>
          <div class="buildings" id="specializationList"></div>
        </div>
        </section>

        <section class="category" data-category="goals">
          <div class="category-head">
            <h3 class="category-title">目标栏目</h3>
            <button class="category-toggle" data-toggle-category="goals"><span class="arrow">▶</span><span class="label">折叠</span><span class="badge-dot" aria-hidden="true"></span></button>
          </div>
          <div class="category-body">
          <h2 class="section-title">成就</h2>
          <div class="buildings" id="achievementList"></div>

          <h2 class="section-title">事件日志</h2>
          <div class="buildings" id="eventLog"></div>
          </div>
        </section>
      </div>
    </section>
  </main>
  <div id="fxLayer" class="fx-layer"></div>

  <script>
    const PRICE_GROWTH = 1.15;
    const PRICE_CURVE_MID_START = 40;
    const PRICE_CURVE_LATE_START = 100;
    const PRICE_CURVE_MID_FACTOR = 0.82;
    const PRICE_CURVE_LATE_FACTOR = 0.68;
    const PRESTIGE_BASE_DIVISOR = 2000;
    const PRESTIGE_LATE_BONUS_START = 2_000_000;
    const PRESTIGE_LATE_BONUS_STEP = 2_000_000;
    const SAVE_KEY = "crazy_factory_save_v1";
    const SAVE_VERSION = 2;
    const TICK_RATE = 60;
    const FIXED_STEP = 1 / TICK_RATE;
    const MAX_ACCUMULATED_SECONDS = 0.25;
    const OFFLINE_CAP_SECONDS = 8 * 60 * 60;
    const ORDER_UNLOCK_LIFETIME_GEARS = 300;
    const ORDER_REROLL_COST = 200;

    // 手感参数：集中在这里，便于快速调“多汁感”。
    const FX_FLOAT_DURATION_MS = 850;
    const FX_PANEL_PULSE_MS = 300;
    const FX_BTN_POP_MS = 200;
    const ORDER_TIER_STEP = 2000;
    const AUDIO_VOLUME = 0.03;
    const AUDIO_ENABLED_DEFAULT = true;
    const COMBO_DECAY_SECONDS = 2.5;
    const COMBO_MAX_STREAK = 40;
    const COMBO_BONUS_PER_STACK = 0.02;
    const FX_SHAKE_DURATION_MS = 360;
    const FX_MAX_FLOATING_GAINS = 18;
    const FX_PRIORITY_SLOTS = 2;
    const FX_SHAKE_COOLDOWN_MS = 260;
    const LOW_PERF_FLOAT_SCALE = 0.55;

    const ORDER_TEMPLATES = [
      { key: "clicks", type: "clicks", minTier: 1, weight: 3, title: "订单：人工质检", desc: "手动点击完成一次人工抽检" },
      { key: "lifetime", type: "lifetime", minTier: 1, weight: 3, title: "订单：加急出货", desc: "在当前阶段额外生产齿轮" },
      { key: "conveyor", type: "building", buildingId: "conveyor", minTier: 1, weight: 2, title: "订单：扩展传送线", desc: "新增传送带以提升物流效率" },

    const format = (num) => {
      if (!Number.isFinite(num)) return "0";
      const abs = Math.abs(num);
      if (abs >= 1_000_000_000) return `${(num / 1_000_000_000).toFixed(2)}B`;
      if (abs >= 1_000_000) return `${(num / 1_000_000).toFixed(2)}M`;
      if (abs >= 1_000) return `${(num / 1_000).toFixed(2)}K`;
      return num.toLocaleString("zh-CN", { maximumFractionDigits: 2 });
    };

    const getSkillLevel = (id) => skills.find((s) => s.id === id)?.level || 0;
    const getSpecializationLevel = (buildingId, branch) => specializationUpgrades.find((s) => s.buildingId === buildingId && s.branch === branch)?.level || 0;
    const getBuildingCostMultiplier = (buildingId) => Math.max(0.65, 1 - getSpecializationLevel(buildingId, "cost") * 0.04);
    const getBuildingOutputMultiplier = (buildingId) => 1 + getSpecializationLevel(buildingId, "output") * 0.2;
    const getDiscountMultiplier = (buildingId) => Math.max(0.7, 1 - getSkillLevel("bulk_discount") * 0.03) * getBuildingCostMultiplier(buildingId);

    // 经济曲线二次调优：中后期把“拥有数量”映射为更平缓的有效指数，避免增长斜率过陡造成停滞。
    const getEffectiveOwnedForPrice = (owned) => {
      if (owned <= PRICE_CURVE_MID_START) return owned;
      if (owned <= PRICE_CURVE_LATE_START) {
        return PRICE_CURVE_MID_START + (owned - PRICE_CURVE_MID_START) * PRICE_CURVE_MID_FACTOR;
      }
      const midSegment = (PRICE_CURVE_LATE_START - PRICE_CURVE_MID_START) * PRICE_CURVE_MID_FACTOR;
      const lateSegment = (owned - PRICE_CURVE_LATE_START) * PRICE_CURVE_LATE_FACTOR;
      return PRICE_CURVE_MID_START + midSegment + lateSegment;
    };

    const getCurrentPrice = (building, ownedOffset = 0) => {
      const effectiveOwned = getEffectiveOwnedForPrice(building.owned + ownedOffset);
      return Math.floor(building.basePrice * Math.pow(PRICE_GROWTH, effectiveOwned) * getDiscountMultiplier(building.id));
    };

    const getBaseGPS = () => buildings.reduce((sum, b) => sum + b.dps * b.owned * getBuildingOutputMultiplier(b.id), 0);
    const getResearchMultiplier = () => 1 + state.researchPoints * 0.1;
    const getSkillGpsMultiplier = () => 1 + getSkillLevel("line_optimizer") * 0.2;
    const getSkillManualMultiplier = () => 1 + getSkillLevel("manual_mastery") * 0.25;
    const getTotalGPS = () => getBaseGPS() * state.gpsMultiplier * getResearchMultiplier() * getSkillGpsMultiplier();
    const getComboMultiplier = () => 1 + Math.min(COMBO_MAX_STREAK, state.comboStreak) * COMBO_BONUS_PER_STACK;
    const getManualGain = () => state.manualPower * getSkillManualMultiplier() * getComboMultiplier();

    const getPrestigeGain = (lifetimeGears) => {
      const base = Math.floor(Math.sqrt(lifetimeGears / PRESTIGE_BASE_DIVISOR));
      if (lifetimeGears < PRESTIGE_LATE_BONUS_START) return base;
      const lateBonus = Math.floor((lifetimeGears - PRESTIGE_LATE_BONUS_START) / PRESTIGE_LATE_BONUS_STEP) + 1;
      return base + lateBonus;
    };

    const getAffordableCount = (building, budget, mode) => {
      if (mode === "1") return budget >= getCurrentPrice(building) ? 1 : 0;
      if (mode === "10" || mode === "100") {
        const target = Number(mode);
        let totalCost = 0;
        for (let i = 0; i < target; i += 1) {
          totalCost += getCurrentPrice(building, i);
          if (totalCost > budget) return i;
        }
        return target;
      }

      let count = 0;
      let totalCost = 0;
      while (count < 10000) {
        totalCost += getCurrentPrice(building, count);
        if (totalCost > budget) return count;
        count += 1;
      }
      return count;
    };

    const getPurchaseCost = (building, count) => {
      let cost = 0;
      for (let i = 0; i < count; i += 1) {
        cost += getCurrentPrice(building, i);
      }
      return cost;
    };



    const triggerButtonPop = (el) => {
      if (!el) return;

      void el.offsetWidth;
      el.classList.add("btn-pop");
      window.setTimeout(() => el.classList.remove("btn-pop"), FX_BTN_POP_MS);
    };

    const triggerPanelPulse = (el) => {

      el.classList.remove("panel-pulse");
      void el.offsetWidth;
      el.classList.add("panel-pulse");
      window.setTimeout(() => el.classList.remove("panel-pulse"), FX_PANEL_PULSE_MS);
    };

    const triggerTypedPanelPulse = (type, el = gamePanelEl) => {
      if (!el) return;
      const map = {
        task: "panel-pulse-task",
        order: "panel-pulse-order",
        prestige: "panel-pulse-prestige"
      };
      const className = map[type] || "panel-pulse";
      el.classList.remove("panel-pulse-task", "panel-pulse-order", "panel-pulse-prestige", "panel-pulse");
      void el.offsetWidth;
      el.classList.add(className);
      window.setTimeout(() => el.classList.remove(className), FX_PANEL_PULSE_MS + 40);
    };

    const triggerScreenShake = (el = gamePanelEl, fallbackType = "task") => {
      if (!el) return;
      if (state.lowPerfMode) {
        triggerTypedPanelPulse(fallbackType, el);
        return;
      }
      const now = performance.now();
      // 限制高频震屏；冷却期内自动降级为边框脉冲，保证反馈连续但不过载。
      if (now - state.lastShakeAt < FX_SHAKE_COOLDOWN_MS) {
        triggerTypedPanelPulse(fallbackType, el);
        return;
      }
      state.lastShakeAt = now;
      el.classList.remove("screen-shake");
      void el.offsetWidth;
      el.classList.add("screen-shake");
      window.setTimeout(() => el.classList.remove("screen-shake"), FX_SHAKE_DURATION_MS);
    };

    const spawnFloatingGain = (anchorEl, text, kind = "gear", priority = "normal") => {
      if (!fxLayerEl || !anchorEl) return;
      const hardCap = FX_MAX_FLOATING_GAINS + FX_PRIORITY_SLOTS;
      const normalCap = FX_MAX_FLOATING_GAINS;
      const canSpawn = priority === "high"
        ? state.activeFloatingGains < hardCap
        : state.activeFloatingGains < normalCap;
      if (!canSpawn) return;
      state.activeFloatingGains += 1;

      const rect = anchorEl.getBoundingClientRect();
      const item = document.createElement("div");
      item.className = `floating-gain ${kind}${priority === "high" ? " priority-high" : ""}`;
      item.textContent = text;
      item.style.left = `${rect.left + rect.width / 2}px`;
      item.style.top = `${rect.top - 6}px`;
      fxLayerEl.appendChild(item);
      const duration = Math.floor((FX_FLOAT_DURATION_MS + 80) * (state.lowPerfMode ? LOW_PERF_FLOAT_SCALE : 1));
      window.setTimeout(() => {
        item.remove();
        state.activeFloatingGains = Math.max(0, state.activeFloatingGains - 1);
      }, duration);
    };

    let audioContext = null;

    const getAudioContext = () => {
      if (audioContext) return audioContext;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return null;
      audioContext = new Ctx();
      return audioContext;
    };

    // 统一音效入口：后续可替换为 sample 播放，当前用合成音保证零资源依赖。
    const playSfx = (kind) => {
      if (!state.audioEnabled) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === "suspended") ctx.resume();

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const now = ctx.currentTime;
      const profile = {
        click: { f0: 680, f1: 520, t: 0.06 },
        reward: { f0: 900, f1: 1200, t: 0.1 },
        order: { f0: 480, f1: 720, t: 0.12 },
        prestige: { f0: 320, f1: 860, t: 0.18 }
      }[kind] || { f0: 600, f1: 700, t: 0.08 };

      const audioSafeMode = state.lowPerfMode || state.lowPerfAudioSafe;
      const safeF0 = audioSafeMode ? Math.min(profile.f0, 700) : profile.f0;
      const safeF1 = audioSafeMode ? Math.min(profile.f1, 780) : profile.f1;
      const safeT = audioSafeMode ? Math.min(profile.t, 0.07) : profile.t;

      osc.type = audioSafeMode ? "sine" : "triangle";
      osc.frequency.setValueAtTime(safeF0, now);
      osc.frequency.exponentialRampToValueAtTime(safeF1, now + safeT);

      gain.gain.setValueAtTime(AUDIO_VOLUME, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + safeT);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + safeT);
    };

    const getOrderProgress = (order = state.activeOrder) => {
      if (!order) return 0;
      if (order.type === "clicks") return Math.max(0, state.totalClicks - order.startValue);
      if (order.type === "lifetime") return Math.max(0, state.lifetimeGears - order.startValue);
      if (order.type === "building") {
        const building = buildings.find((b) => b.id === order.buildingId);
        return Math.max(0, (building?.owned || 0) - order.startValue);
      }
      return 0;
    };

    const pickWeightedOrderTemplate = (tier) => {
      const unlocked = ORDER_TEMPLATES.filter((template) => template.minTier <= tier);
      const totalWeight = unlocked.reduce((sum, item) => sum + item.weight, 0);
      let roll = Math.random() * totalWeight;
      for (const template of unlocked) {
        roll -= template.weight;
        if (roll <= 0) return template;
      }
      return unlocked[unlocked.length - 1] || ORDER_TEMPLATES[0];
    };

        state.activeOrder = {
          id: `order_${template.key}_${timestamp}`,
          type: "clicks",
          title: template.title,
          desc: template.desc,
          target: 25 + tier * 5,

      if (version < 2) {
        data.saveVersion = 2;
        if (data.activeOrder && typeof data.activeOrder === "object") {
          const hasType = ["clicks", "lifetime", "building"].includes(data.activeOrder.type);
          const hasTarget = Number.isFinite(Number(data.activeOrder.target));
          if (!hasType || !hasTarget) {
            data.activeOrder = null;

      if (!Number.isFinite(Number(data.saveVersion))) {
        data.saveVersion = SAVE_VERSION;

      return data;

    const exportSave = async () => {

        localStorage.setItem(SAVE_KEY, JSON.stringify(data));

    const loadGame = () => {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = migrateSaveData(JSON.parse(raw));
        if (!data || typeof data !== "object") return;

        state.gears = Number(data.gears) || 0;
        if (["1", "10", "100", "max"].includes(data.purchaseMode)) {
          state.purchaseMode = data.purchaseMode;
        }
        if ([1,2,4].includes(Number(data.gameSpeed))) {
          state.gameSpeed = Number(data.gameSpeed);
        }
        state.autoBuy = Boolean(data.autoBuy);
        state.audioEnabled = data.audioEnabled !== false;
        state.lowPerfMode = Boolean(data.lowPerfMode);
        state.lowPerfAudioSafe = Boolean(data.lowPerfAudioSafe);
        if (data.categoryCollapse && typeof data.categoryCollapse === "object") {
          state.categoryCollapse.economy = Boolean(data.categoryCollapse.economy);
          state.categoryCollapse.goals = Boolean(data.categoryCollapse.goals);
        }
        state.comboStreak = 0;
        state.comboTimer = 0;
        state.activeFloatingGains = 0;
        state.lastShakeAt = 0;
        state.questIndex = Math.max(0, Math.min(Number(data.questIndex) || 0, questChain.length));
        if (Array.isArray(data.logs)) state.logs = data.logs.slice(0, 20);

        if (Array.isArray(data.buildings)) {
          for (const saved of data.buildings) {
            const target = buildings.find((b) => b.id === saved.id);
            if (!target) continue;
            target.owned = Math.max(0, Math.floor(Number(saved.owned) || 0));
          }
        }

        state.manualPower = Math.max(1, Number(data.manualPower) || 1);
        state.gpsMultiplier = Math.max(1, Number(data.gpsMultiplier) || 1);
        state.totalClicks = Math.max(0, Number(data.totalClicks) || 0);
        state.lifetimeGears = Math.max(0, Number(data.lifetimeGears) || 0);
        state.researchPoints = Math.max(0, Math.floor(Number(data.researchPoints) || 0));
        if (data.activeOrder && typeof data.activeOrder === "object") {
          state.activeOrder = data.activeOrder;
        }

        if (Array.isArray(data.upgrades)) {
          for (const saved of data.upgrades) {
            const target = upgrades.find((u) => u.id === saved.id);
            if (!target) continue;
            target.purchased = Boolean(saved.purchased);
          }
        }

        if (Array.isArray(data.skills)) {
          for (const saved of data.skills) {
            const target = skills.find((s) => s.id === saved.id);
            if (!target) continue;
            target.level = Math.max(0, Math.min(target.maxLevel, Math.floor(Number(saved.level) || 0)));
          }
        }

        if (Array.isArray(data.specializationUpgrades)) {
          for (const saved of data.specializationUpgrades) {
            const target = specializationUpgrades.find((sp) => sp.id === saved.id);
            if (!target) continue;
            target.level = Math.max(0, Math.min(target.maxLevel, Math.floor(Number(saved.level) || 0)));
          }
        }

        if (Array.isArray(data.achievements)) {
          for (const saved of data.achievements) {
            const target = achievements.find((a) => a.id === saved.id);
            if (!target) continue;
            target.done = Boolean(saved.done);
            target.claimed = Boolean(saved.claimed);
          }
        }

        const savedAt = Number(data.savedAt) || Date.now();
        const offlineSeconds = Math.max(0, Math.min((Date.now() - savedAt) / 1000, OFFLINE_CAP_SECONDS));
        const offlineGears = getTotalGPS() * offlineSeconds;
        if (offlineGears > 0) {
          state.pendingOfflineGears = offlineGears;
        }

        ensureOrder();

        if ((Number(data.saveVersion) || 1) !== SAVE_VERSION) {
          saveGame();
        }
      } catch (error) {
        console.warn("存档读取失败，已忽略：", error);
      }
    };

    const createBuildingRow = (building) => {
      const row = document.createElement("div");
      row.className = "building";
      row.dataset.id = building.id;

      row.innerHTML = `
        <div>
          <div class="name">${building.name}</div>
          <div class="meta">
            <span>产出：${building.dps} / 秒</span>
            <span>拥有：<strong data-owned="${building.id}">0</strong></span>
          </div>
          <div class="hint" data-hint="${building.id}"></div>
          <div class="locked-note" data-lock="${building.id}"></div>
        </div>
        <button class="btn buy-btn" data-buy="${building.id}">购买 x1（0 齿轮）</button>
      `;

      buildingList.appendChild(row);

      buildingViewMap.set(building.id, {
        ownedEl: row.querySelector(`[data-owned="${building.id}"]`),
        buyBtn: row.querySelector(`[data-buy="${building.id}"]`),
        hintEl: row.querySelector(`[data-hint="${building.id}"]`),
        lockEl: row.querySelector(`[data-lock="${building.id}"]`)
      });
    };

    const createUpgradeRow = (upgrade) => {
      const row = document.createElement("div");
      row.className = "upgrade";
      row.dataset.id = upgrade.id;
      row.innerHTML = `
        <div>
          <div class="name">${upgrade.name}</div>
          <div class="meta">${upgrade.desc}</div>
          <div class="meta" data-upgrade-lock="${upgrade.id}"></div>
        </div>
        <button class="btn upgrade-btn" data-upgrade="${upgrade.id}">研发（${format(upgrade.price)} 齿轮）</button>
      `;
      upgradeList.appendChild(row);
      upgradeViewMap.set(upgrade.id, {
        btn: row.querySelector(`[data-upgrade="${upgrade.id}"]`),
        lockEl: row.querySelector(`[data-upgrade-lock="${upgrade.id}"]`)
      });
    };

    const createSkillRow = (skill) => {
      const row = document.createElement("div");
      row.className = "skill";
      row.dataset.id = skill.id;
      row.innerHTML = `
        <div>
          <div class="name">${skill.name}</div>
          <div class="meta">${skill.desc}</div>
          <div class="meta" data-skill-meta="${skill.id}"></div>
        </div>
        <button class="btn skill-btn" data-skill-buy="${skill.id}">升级（1 RP）</button>
      `;
      skillList.appendChild(row);
      skillViewMap.set(skill.id, {
        btn: row.querySelector(`[data-skill-buy="${skill.id}"]`),
        meta: row.querySelector(`[data-skill-meta="${skill.id}"]`)
      });
    };

    const createSpecializationRow = (spec) => {
      const row = document.createElement("div");
      row.className = "skill";
      row.dataset.id = spec.id;
      row.innerHTML = `
        <div>
          <div class="name">${spec.name}</div>
          <div class="meta">${spec.desc}</div>
          <div class="meta" data-spec-meta="${spec.id}"></div>
        </div>
        <button class="btn skill-btn" data-spec-buy="${spec.id}">升级（${spec.costRP} RP）</button>
      `;
      specializationList.appendChild(row);
      specializationViewMap.set(spec.id, {
        btn: row.querySelector(`[data-spec-buy="${spec.id}"]`),
        meta: row.querySelector(`[data-spec-meta="${spec.id}"]`)
      });
    };

    const buySpecialization = (id) => {
      const spec = specializationUpgrades.find((sp) => sp.id === id);
      if (!spec) return;
      if (spec.level >= spec.maxLevel) return;
      if (state.researchPoints < spec.costRP) return;
      state.researchPoints -= spec.costRP;
      spec.level += 1;
      pushLog(`专精升级：${spec.name} Lv.${spec.level}`);
      saveGame();
      render();
    };

    const createAchievementRow = (achievement) => {
      const row = document.createElement("div");
      row.className = "achievement";
      row.dataset.id = achievement.id;
      row.innerHTML = `
        <div>
          <div class="name">${achievement.name}</div>
          <div class="meta">${achievement.desc}</div>
        </div>
        <span class="badge" data-achievement-badge="${achievement.id}">未完成</span>
      `;
      achievementList.appendChild(row);
      achievementViewMap.set(achievement.id, {
        badge: row.querySelector(`[data-achievement-badge="${achievement.id}"]`)
      });
    };

    
    const claimAchievementReward = (achievement) => {
      if (!achievement.reward || achievement.claimed) return;
      achievement.claimed = true;
      grantReward(achievement.reward, `成就奖励（${achievement.name}）`, "high");
      saveGame();
    };

    
    const isBuildingUnlocked = (building) => state.lifetimeGears >= building.unlockLifetimeGears;

    const getUpgradeLockedReason = (upgrade) => {
      if (state.researchPoints < upgrade.unlockRP) {
        return `需要 RP ${upgrade.unlockRP}`;
      }
      if (upgrade.requires) {
        const required = upgrades.find((u) => u.id === upgrade.requires);
        if (required && !required.purchased) return `前置：${required.name}`;
      }
      return "";
    };

    
    const pushLog = (message) => {
      const line = `[${new Date().toLocaleTimeString("zh-CN", { hour12: false })}] ${message}`;
      state.logs.unshift(line);
      state.logs = state.logs.slice(0, 20);
    };

    const grantReward = (reward, label, priority = "normal") => {
      if (!reward) return;
      if (reward.type === "gear") {
        state.gears += reward.value;
        state.lifetimeGears += reward.value;
        state.lastRewardText = `${label}：+${format(reward.value)} 齿轮`;
        pushLog(state.lastRewardText);
        spawnFloatingGain(gamePanelEl, `+${format(reward.value)} 齿轮`, "gear", priority);
        triggerPanelPulse(gamePanelEl);
        playSfx("reward");
      }
      if (reward.type === "rp") {
        state.researchPoints += reward.value;
        state.lastRewardText = `${label}：+${reward.value} RP`;
        pushLog(state.lastRewardText);
        spawnFloatingGain(gamePanelEl, `+${reward.value} RP`, "rp", priority);
        triggerPanelPulse(gamePanelEl);
        playSfx("reward");
      }
    };

    const updateQuestProgress = () => {
      if (state.questIndex >= questChain.length) {
        goalTitleEl.textContent = "阶段任务：已全部完成";
        goalFillEl.style.width = "100%";
        goalHintEl.textContent = "你已完成当前任务链";
        goalPctEl.textContent = "100%";
        questRewardEl.textContent = "奖励：已领取完毕";
        return;
      }

      const quest = questChain[state.questIndex];
      const current = quest.progress();
      const pct = Math.min(100, (current / quest.target) * 100);
      goalTitleEl.textContent = `阶段任务：${quest.title}`;
      goalFillEl.style.width = `${pct}%`;
      goalHintEl.textContent = current >= quest.target ? "任务已完成，奖励已发放" : `进度 ${format(current)} / ${format(quest.target)}`;
      goalPctEl.textContent = `${pct.toFixed(0)}%`;
      questRewardEl.textContent = `奖励：${quest.rewardText}`;

      if (current >= quest.target) {
        grantReward(quest.reward, `任务奖励（${quest.title}）`, "high");
        triggerScreenShake(gamePanelEl, "task");
        playSfx("order");
        state.questIndex += 1;
        saveGame();
      }
    };

    const renderCategoryCollapse = () => {
      for (const section of document.querySelectorAll(".category[data-category]")) {
        const key = section.getAttribute("data-category");
        const collapsed = Boolean(state.categoryCollapse?.[key]);
        section.classList.toggle("collapsed", collapsed);
        const btn = section.querySelector("[data-toggle-category]");
        if (btn) {
          const label = btn.querySelector(".label");
          if (label) label.textContent = collapsed ? "展开" : "折叠";
        }
      }
    };

    const renderCategoryAlerts = () => {
      const goalToggle = document.querySelector("[data-toggle-category=\"goals\"]");
      if (!goalToggle) return;
      const hasUnclaimedOrder = Boolean(state.activeOrder) && getOrderProgress(state.activeOrder) >= state.activeOrder.target;
      const hasClaimableAchievement = achievements.some((a) => !a.done && a.check());
      goalToggle.classList.toggle("has-alert", hasUnclaimedOrder || hasClaimableAchievement);
    };

    const renderMode = () => {
      for (const btn of modeButtons) {
        btn.classList.toggle("active", btn.dataset.mode === state.purchaseMode);
      }
      for (const btn of speedButtons) {
        btn.classList.toggle("active", Number(btn.dataset.speed) === state.gameSpeed);
      }
      autoBuyBtn.classList.toggle("active", state.autoBuy);
      autoBuyBtn.textContent = `自动购买: ${state.autoBuy ? "开" : "关"}`;
      audioBtn.classList.toggle("active", state.audioEnabled);
      audioBtn.textContent = `音效: ${state.audioEnabled ? "开" : "关"}`;
      lowPerfBtn.classList.toggle("active", state.lowPerfMode);
      lowPerfBtn.textContent = `低性能模式: ${state.lowPerfMode ? "开" : "关"}`;
      lowPerfAudioBtn.classList.toggle("active", state.lowPerfAudioSafe);
      lowPerfAudioBtn.textContent = `低性能音效保护: ${state.lowPerfAudioSafe ? "开" : "关"}`;
    };

    const render = () => {
      gearsEl.textContent = format(state.gears);
      gpsEl.textContent = format(getTotalGPS());
      rpEl.textContent = `研究点 RP：${state.researchPoints}（总产出 x${getResearchMultiplier().toFixed(1)}，速度 x${state.gameSpeed}）`;

      for (const building of buildings) {
        const view = buildingViewMap.get(building.id);
        if (!view) continue;

        const count = getAffordableCount(building, state.gears, state.purchaseMode);
        const intendedCount = state.purchaseMode === "max" ? count : Math.min(count, Number(state.purchaseMode) || 1);
        const purchaseCount = Math.max(1, intendedCount || 0);
        const cost = getPurchaseCost(building, purchaseCount);

        view.ownedEl.textContent = building.owned;
        view.buyBtn.textContent = `购买 x${purchaseCount}（${format(cost)} 齿轮）`;

        const unlocked = isBuildingUnlocked(building);
        const affordable = count > 0 && unlocked;
        view.buyBtn.disabled = !affordable;

        if (!unlocked) {
          view.lockEl.textContent = `解锁条件：累计齿轮 ${format(building.unlockLifetimeGears)}`;
          view.hintEl.textContent = "";
        } else {
          view.lockEl.textContent = "";
          if (affordable) {
            view.hintEl.textContent = "";
          } else {
            const nextPrice = getCurrentPrice(building);
            view.hintEl.textContent = `还差 ${format(nextPrice - state.gears)} 齿轮`;
          }
        }
      }

      for (const upgrade of upgrades) {
        const view = upgradeViewMap.get(upgrade.id);
        if (!view) continue;
        if (upgrade.purchased) {
          view.btn.textContent = "已研发";
          view.btn.disabled = true;
          view.lockEl.textContent = "";
          continue;
        }
        const lockedReason = getUpgradeLockedReason(upgrade);
        view.lockEl.textContent = lockedReason;
        view.btn.textContent = `研发（${format(upgrade.price)} 齿轮）`;
        view.btn.disabled = state.gears < upgrade.price || Boolean(lockedReason);
      }
      updateQuestProgress();

      for (const skill of skills) {
        const view = skillViewMap.get(skill.id);
        if (!view) continue;
        view.meta.textContent = `等级 ${skill.level}/${skill.maxLevel}`;
        if (skill.level >= skill.maxLevel) {
          view.btn.disabled = true;
          view.btn.textContent = "已满级";
        } else {
          view.btn.disabled = state.researchPoints < skill.costRP;
          view.btn.textContent = `升级（${skill.costRP} RP）`;
        }
      }

      for (const spec of specializationUpgrades) {
        const view = specializationViewMap.get(spec.id);
        if (!view) continue;
        view.meta.textContent = `等级 ${spec.level}/${spec.maxLevel}`;
        if (spec.level >= spec.maxLevel) {
          view.btn.disabled = true;
          view.btn.textContent = "已满级";
        } else {
          view.btn.disabled = state.researchPoints < spec.costRP;
          view.btn.textContent = `升级（${spec.costRP} RP）`;
        }
      }

      for (const achievement of achievements) {
        if (!achievement.done && achievement.check()) {
          achievement.done = true;
          claimAchievementReward(achievement);
        }
        const view = achievementViewMap.get(achievement.id);
        if (!view) continue;
        view.badge.classList.toggle("done", achievement.done);
        view.badge.textContent = achievement.done ? (achievement.claimed ? "已完成+奖励" : "已完成") : "未完成";
      }

      if (state.pendingOfflineGears > 0) {
        offlineNoticeEl.style.display = "flex";
        offlineTextEl.textContent = `你离开期间积累了 ${format(state.pendingOfflineGears)} 齿轮`;
      } else {
        offlineNoticeEl.style.display = "none";
        offlineTextEl.textContent = "";
      }

      rewardFeedEl.textContent = state.lastRewardText || "成就奖励将显示在这里";

      eventLogEl.innerHTML = "";
      for (const line of state.logs.slice(0, 6)) {
        const el = document.createElement("div");
        el.className = "log-item";
        el.textContent = line;
        eventLogEl.appendChild(el);
      }

      const totalBuildings = buildings.reduce((sum, b) => sum + b.owned, 0);
      const doneAchievements = achievements.filter((a) => a.done).length;
      const doneUpgrades = upgrades.filter((u) => u.purchased).length;
      const totalSkillLevels = skills.reduce((sum, s) => sum + s.level, 0);
      const totalSpecLevels = specializationUpgrades.reduce((sum, sp) => sum + sp.level, 0);
      statBuildingsEl.textContent = `建筑总数：${totalBuildings}`;
      statUpgradesEl.textContent = `升级已研发：${doneUpgrades}/${upgrades.length} | 技能等级：${totalSkillLevels} | 专精等级：${totalSpecLevels}`;
      statAchievementsEl.textContent = `成就完成：${doneAchievements}/${achievements.length}`;
      statQuestEl.textContent = `任务进度：${Math.min(state.questIndex, questChain.length)}/${questChain.length}`;
      statModeEl.textContent = `自动购买：${state.autoBuy ? "开" : "关"}`;
      statLifetimeEl.textContent = `累计齿轮：${format(state.lifetimeGears)}`;

      if (manualHintEl) {
        manualHintEl.textContent = `连击 x${(getComboMultiplier()).toFixed(2)}（${state.comboStreak} 连，${COMBO_DECAY_SECONDS}s 衰减）`;
      }

      const orderUnlocked = state.lifetimeGears >= ORDER_UNLOCK_LIFETIME_GEARS;
      if (!orderUnlocked) {
        orderTitleEl.textContent = "生产订单：尚未解锁";
        orderFillEl.style.width = "0%";
        orderHintEl.textContent = `累计齿轮达到 ${ORDER_UNLOCK_LIFETIME_GEARS} 后解锁`;
        orderPctEl.textContent = "0%";
        orderRewardEl.textContent = "奖励：-";
        claimOrderBtn.disabled = true;
        rerollOrderBtn.disabled = true;
      } else {
        ensureOrder();

        if ((Number(data.saveVersion) || 1) !== SAVE_VERSION) {
          saveGame();
        }
        const order = state.activeOrder;
        const progress = order ? Math.min(getOrderProgress(order), order.target) : 0;
        const pct = order ? Math.min(100, (progress / order.target) * 100) : 0;
        orderTitleEl.textContent = order?.title || "生产订单";
        orderFillEl.style.width = `${pct}%`;
        orderHintEl.textContent = order ? `${order.desc}（${format(progress)} / ${format(order.target)}）` : "暂无订单";
        orderPctEl.textContent = `${pct.toFixed(0)}%`;
        orderRewardEl.textContent = order
          ? `奖励：${order.reward.type === "gear" ? `+${format(order.reward.value)} 齿轮` : `+${order.reward.value} RP`}`
          : "奖励：-";
        claimOrderBtn.disabled = !(order && progress >= order.target);
        rerollOrderBtn.disabled = state.gears < ORDER_REROLL_COST;
      }

      renderMode();
      renderCategoryCollapse();
      renderCategoryAlerts();
    };

    const tryAutoBuy = () => {
      // 优先购买升级，再购买建筑
      for (const upgrade of upgrades) {
        if (upgrade.purchased) continue;
        if (getUpgradeLockedReason(upgrade)) continue;
        if (state.gears >= upgrade.price) {
          buyUpgrade(upgrade.id);
          return;
        }
      }

      for (const building of [...buildings].reverse()) {
        if (!isBuildingUnlocked(building)) continue;
        const count = getAffordableCount(building, state.gears, "1");
        if (count > 0) {
          const prevMode = state.purchaseMode;
          state.purchaseMode = "1";
          buyBuilding(building.id);
          state.purchaseMode = prevMode;
          return;
        }
      }
    };

    const buySkill = (id) => {
      const skill = skills.find((s) => s.id === id);
      if (!skill) return;
      if (skill.level >= skill.maxLevel) return;
      if (state.researchPoints < skill.costRP) return;
      state.researchPoints -= skill.costRP;
      skill.level += 1;
      pushLog(`技能升级：${skill.name} Lv.${skill.level}`);
      saveGame();
      render();
    };

    const buyBuilding = (id) => {
      const building = buildings.find((b) => b.id === id);
      if (!building) return;
      if (!isBuildingUnlocked(building)) return;

      const count = getAffordableCount(building, state.gears, state.purchaseMode);
      if (count <= 0) return;

      const purchaseCount = state.purchaseMode === "max" ? count : Math.min(count, Number(state.purchaseMode) || 1);
      const cost = getPurchaseCost(building, purchaseCount);

      if (state.gears < cost) return;

      state.gears -= cost;
      building.owned += purchaseCount;
      pushLog(`购买 ${building.name} x${purchaseCount}`);
      saveGame();
      render();
    };

    const buyUpgrade = (id) => {
      const upgrade = upgrades.find((u) => u.id === id);
      if (!upgrade || upgrade.purchased) return;
      const lockedReason = getUpgradeLockedReason(upgrade);
      if (lockedReason) return;
      if (state.gears < upgrade.price) return;

      state.gears -= upgrade.price;
      upgrade.purchased = true;

      if (upgrade.type === "manual") state.manualPower += upgrade.value;
      if (upgrade.type === "gps") state.gpsMultiplier *= upgrade.value;
      pushLog(`研发升级：${upgrade.name}`);

      saveGame();
      render();
    };

    manualBtn.addEventListener("click", () => {
      state.comboStreak = Math.min(COMBO_MAX_STREAK, state.comboStreak + 1);
      state.comboTimer = COMBO_DECAY_SECONDS;

      const gain = getManualGain();
      state.gears += gain;
      state.lifetimeGears += gain;
      state.totalClicks += 1;
      if (state.totalClicks === 1) pushLog("首次手动生产");

      if (state.comboStreak === 10 || state.comboStreak === 25) {
        triggerPanelPulse(gamePanelEl);
        playSfx("order");
        pushLog(`连击加速：${state.comboStreak} 连击`);
      }

      triggerButtonPop(manualBtn);
      spawnFloatingGain(manualBtn, `+${format(gain)}`, "gear");
      playSfx("click");
      saveGame();
      render();
    });

    buildingList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.buy;
      if (!id) return;
      buyBuilding(id);
    });

    upgradeList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.upgrade;
      if (!id) return;
      buyUpgrade(id);
    });

    skillList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.skillBuy;
      if (!id) return;
      buySkill(id);
    });

    specializationList.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const id = target.dataset.specBuy;
      if (!id) return;
      buySpecialization(id);
    });


    exportSaveBtn.addEventListener("click", () => {
      exportSave();
      render();
    });

    importSaveBtn.addEventListener("click", () => {
      importSave();
      saveGame();
    });

    document.querySelector(".controls").addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;

      const mode = target.dataset.mode;
      if (mode) {
        state.purchaseMode = mode;
        saveGame();
        render();
        return;
      }

      const speed = Number(target.dataset.speed);
      if ([1, 2, 4].includes(speed)) {
        state.gameSpeed = speed;
        saveGame();
        render();
        return;
      }

      if (target.id === "autoBuyBtn") {
        state.autoBuy = !state.autoBuy;
        pushLog(`自动购买已${state.autoBuy ? "开启" : "关闭"}`);
        saveGame();
        render();
        return;
      }

      if (target.id === "audioBtn") {
        state.audioEnabled = !state.audioEnabled;
        if (state.audioEnabled) playSfx("click");
        pushLog(`音效已${state.audioEnabled ? "开启" : "关闭"}`);
        saveGame();
        render();
        return;
      }

      if (target.id === "lowPerfBtn") {
        state.lowPerfMode = !state.lowPerfMode;
        if (state.lowPerfMode) state.lowPerfAudioSafe = true;
        pushLog(`低性能模式已${state.lowPerfMode ? "开启" : "关闭"}`);
        saveGame();
        render();
        return;
      }

      if (target.id === "lowPerfAudioBtn") {
        state.lowPerfAudioSafe = !state.lowPerfAudioSafe;
        pushLog(`低性能音效保护已${state.lowPerfAudioSafe ? "开启" : "关闭"}`);
        saveGame();
        render();
      }
    });


    document.querySelector('.category-grid').addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof HTMLButtonElement)) return;
      const key = target.dataset.toggleCategory;
      if (!key) return;
      state.categoryCollapse[key] = !state.categoryCollapse[key];
      saveGame();
      renderCategoryCollapse();
    });

    claimOfflineBtn.addEventListener("click", () => {
      if (state.pendingOfflineGears <= 0) return;
      state.gears += state.pendingOfflineGears;
      state.lifetimeGears += state.pendingOfflineGears;
      state.pendingOfflineGears = 0;
      saveGame();
      render();
    });

    claimOrderBtn.addEventListener("click", () => {
      const order = state.activeOrder;
      if (!order) return;
      const progress = getOrderProgress(order);
      if (progress < order.target) return;
      grantReward(order.reward, `订单完成（${order.title}）`, "high");
      triggerPanelPulse(document.getElementById("orderPanel"));
      triggerScreenShake(gamePanelEl, "order");
      playSfx("order");
      state.activeOrder = null;
      ensureOrder();
      saveGame();
      render();
    });

    rerollOrderBtn.addEventListener("click", () => {
      if (state.lifetimeGears < ORDER_UNLOCK_LIFETIME_GEARS) return;
      if (state.gears < ORDER_REROLL_COST) return;
      state.gears -= ORDER_REROLL_COST;
      createOrder();
      pushLog("已刷新生产订单");
      spawnFloatingGain(rerollOrderBtn, `-${ORDER_REROLL_COST} 齿轮`, "gear");
      triggerPanelPulse(document.getElementById("orderPanel"));
      triggerScreenShake(gamePanelEl, "order");
      playSfx("order");
      render();
    });

    prestigeBtn.addEventListener("click", () => {
      const gain = getPrestigeGain(state.lifetimeGears);
      if (gain <= 0) {
        window.alert("累计齿轮不足，无法获得研究点。继续扩张产线吧！");
        return;
      }
      const ok = window.confirm(`执行软重置可获得 ${gain} 研究点（RP），是否继续？`);
      if (!ok) return;

      state.researchPoints += gain;
      pushLog(`执行 Prestige，获得 RP +${gain}`);
      playSfx("prestige");
      triggerScreenShake(gamePanelEl, "prestige");
      state.gears = 0;
      state.purchaseMode = "1";
      state.pendingOfflineGears = 0;
      state.accumulator = 0;
      state.manualPower = 1;
      state.gpsMultiplier = 1;
      state.totalClicks = 0;
      state.lifetimeGears = 0;
      state.lastRewardText = "";
      state.gameSpeed = 1;
      state.questIndex = 0;
      state.autoBuy = false;
      state.autoBuyAccumulator = 0;
      state.activeOrder = null;
      state.comboStreak = 0;
      state.comboTimer = 0;
      for (const b of buildings) b.owned = 0;
      for (const u of upgrades) u.purchased = false;
      for (const s of skills) s.level = 0;
      for (const sp of specializationUpgrades) sp.level = 0;
      for (const a of achievements) { a.done = false; a.claimed = false; }
      saveGame();
      render();
    });

    resetSaveBtn.addEventListener("click", () => {
      const ok = window.confirm("确认重置所有进度吗？");
      if (!ok) return;
      localStorage.removeItem(SAVE_KEY);
      state.logs = ["[--:--:--] 执行硬重置"];
      state.gears = 0;
      state.purchaseMode = "1";
      state.pendingOfflineGears = 0;
      state.accumulator = 0;
      state.manualPower = 1;
      state.gpsMultiplier = 1;
      state.totalClicks = 0;
      state.lifetimeGears = 0;
      state.researchPoints = 0;
      state.lastRewardText = "";
      state.gameSpeed = 1;
      state.questIndex = 0;
      state.autoBuy = false;
      state.autoBuyAccumulator = 0;
      state.activeOrder = null;
      state.comboStreak = 0;
      state.comboTimer = 0;
      for (const b of buildings) b.owned = 0;
      for (const u of upgrades) u.purchased = false;
      for (const s of skills) s.level = 0;
      for (const sp of specializationUpgrades) sp.level = 0;
      for (const a of achievements) { a.done = false; a.claimed = false; }
      render();
    });

    for (const building of buildings) createBuildingRow(building);
    for (const upgrade of upgrades) createUpgradeRow(upgrade);
    for (const skill of skills) createSkillRow(skill);
    for (const spec of specializationUpgrades) createSpecializationRow(spec);
    for (const achievement of achievements) createAchievementRow(achievement);

    loadGame();

    let lastAutoSave = performance.now();
    const tick = (now) => {
      const frameDelta = Math.min((now - state.lastTimestamp) / 1000, MAX_ACCUMULATED_SECONDS);
      state.lastTimestamp = now;
      state.accumulator += frameDelta;

      const gps = getTotalGPS();
      while (state.accumulator >= FIXED_STEP) {
        const gain = gps * FIXED_STEP * state.gameSpeed;
        state.gears += gain;
        state.lifetimeGears += gain;
        state.accumulator -= FIXED_STEP;

        if (state.comboTimer > 0) {
          state.comboTimer = Math.max(0, state.comboTimer - FIXED_STEP * state.gameSpeed);
          if (state.comboTimer === 0 && state.comboStreak > 0) {
            state.comboStreak = 0;
          }
        }

        if (state.autoBuy) {
          state.autoBuyAccumulator += FIXED_STEP * state.gameSpeed;
          if (state.autoBuyAccumulator >= 0.5) {
            state.autoBuyAccumulator = 0;
            tryAutoBuy();
          }
        }
      }

      if (now - lastAutoSave > 5000) {
        saveGame();
        lastAutoSave = now;
      }

      render();
      requestAnimationFrame(tick);
    };

    render();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
